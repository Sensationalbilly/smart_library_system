<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Smart Fraud Detection App</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f7f8;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
    }
    .container {
      width: 400px;
      background: #fff;
      margin-top: 50px;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }
    h1, h2 {
      text-align: center;
      color: #333;
    }
    label {
      display: block;
      margin-top: 15px;
      font-weight: bold;
    }
    input, select, button {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border-radius: 5px;
      border: 1px solid #ccc;
      box-sizing: border-box;
    }
    button {
      background-color: #4CAF50;
      color: white;
      border: none;
      cursor: pointer;
      margin-top: 20px;
      font-size: 16px;
    }
    button:hover {
      background-color: #45a049;
    }
    #result {
      margin-top: 20px;
      padding: 15px;
      background: #eef;
      border-radius: 5px;
      white-space: pre-wrap;
    }
    .hidden {
      display: none;
    }
    .dashboard {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }
  </style>
</head>
<body>

<div class="container">
  <!-- Signup/Login -->
  <div id="auth">
    <h1>Welcome</h1>
    <div id="signupForm">
      <h2>Sign Up</h2>
      <label>Username</label>
      <input type="text" id="signupUsername" />
      <label>Password</label>
      <input type="password" id="signupPassword" />
      <button onclick="signup()">Sign Up</button>
      <p>Already have an account? <a href="#" onclick="showLogin()">Login</a></p>
    </div>

    <div id="loginForm" class="hidden">
      <h2>Login</h2>
      <label>Username</label>
      <input type="text" id="loginUsername" />
      <label>Password</label>
      <input type="password" id="loginPassword" />
      <button onclick="login()">Login</button>
      <p>Don't have an account? <a href="#" onclick="showSignup()">Sign Up</a></p>
    </div>
  </div>

  <!-- Dashboard -->
  <div id="dashboard" class="hidden">
    <h1>Dashboard</h1>
    <p id="welcomeMsg"></p>
    
    <div class="dashboard">
      <label>Amount:</label>
      <input type="number" id="amount" />
      <label>Type:</label>
      <select id="type">
        <option value="local">Local</option>
        <option value="international">International</option>
      </select>
      <button id="checkBtn">Check Fraud Risk</button>
    </div>

    <h3>Result:</h3>
    <pre id="result">Waiting...</pre>
    <button onclick="logout()">Logout</button>
  </div>
</div>

<script>
// Simple in-memory storage for demo purposes
let users = {};
let currentUser = null;

// Show/hide forms
function showLogin() {
  document.getElementById('signupForm').classList.add('hidden');
  document.getElementById('loginForm').classList.remove('hidden');
}

function showSignup() {
  document.getElementById('loginForm').classList.add('hidden');
  document.getElementById('signupForm').classList.remove('hidden');
}

// Authentication functions
function signup() {
  const username = document.getElementById('signupUsername').value;
  const password = document.getElementById('signupPassword').value;
  
  if (!username || !password) {
    alert('Please fill in all fields');
    return;
  }
  
  if (users[username]) {
    alert('Username already exists');
    return;
  }
  
  users[username] = { password };
  alert('Account created successfully! Please login.');
  showLogin();
}

function login() {
  const username = document.getElementById('loginUsername').value;
  const password = document.getElementById('loginPassword').value;
  
  if (!username || !password) {
    alert('Please fill in all fields');
    return;
  }
  
  if (!users[username] || users[username].password !== password) {
    alert('Invalid credentials');
    return;
  }
  
  currentUser = username;
  showDashboard();
}

function logout() {
  currentUser = null;
  document.getElementById('dashboard').classList.add('hidden');
  document.getElementById('auth').classList.remove('hidden');
  document.getElementById('result').textContent = 'Waiting...';
}

function showDashboard() {
  document.getElementById('auth').classList.add('hidden');
  document.getElementById('dashboard').classList.remove('hidden');
  document.getElementById('welcomeMsg').textContent = `Welcome, ${currentUser}!`;
}

// Fraud detection logic
function checkFraud() {
  const amount = parseFloat(document.getElementById('amount').value);
  const type = document.getElementById('type').value;
  
  if (!amount || amount <= 0) {
    document.getElementById('result').textContent = 'Please enter a valid amount';
    return;
  }
  
  let riskScore = 0;
  let riskLevel = 'LOW';
  let reasons = [];
  
  // Simple fraud detection rules
  if (amount > 10000) {
    riskScore += 30;
    reasons.push('High transaction amount');
  }
  
  if (type === 'international') {
    riskScore += 20;
    reasons.push('International transaction');
  }
  
  if (amount > 50000) {
    riskScore += 40;
    reasons.push('Extremely high amount');
  }
  
  // Determine risk level
  if (riskScore >= 60) {
    riskLevel = 'HIGH';
  } else if (riskScore >= 30) {
    riskLevel = 'MEDIUM';
  }
  
  const result = {
    amount: amount,
    type: type,
    riskScore: riskScore,
    riskLevel: riskLevel,
    reasons: reasons.length > 0 ? reasons : ['Normal transaction pattern'],
    recommendation: riskLevel === 'HIGH' ? 'BLOCK' : riskLevel === 'MEDIUM' ? 'REVIEW' : 'APPROVE'
  };
  
  document.getElementById('result').textContent = JSON.stringify(result, null, 2);
}

// Event listener for check button
document.addEventListener('DOMContentLoaded', function() {
  document.getElementById('checkBtn').addEventListener('click', checkFraud);
});
</script>
</body>
</html>
