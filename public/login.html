<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Smart Financial Shield</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      background: white;
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      max-width: 450px;
      width: 100%;
    }

    h1 {
      color: #667eea;
      text-align: center;
      margin-bottom: 10px;
      font-size: 32px;
    }

    h2 {
      color: #333;
      text-align: center;
      margin-bottom: 30px;
      font-size: 20px;
      font-weight: normal;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      color: #333;
      margin-bottom: 8px;
      font-weight: 500;
    }

    input {
      width: 100%;
      padding: 14px;
      border: 2px solid #e1e8ed;
      border-radius: 10px;
      font-size: 16px;
      transition: all 0.3s;
    }

    input:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    button {
      width: 100%;
      padding: 14px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
      font-size: 18px;
      margin-top: 10px;
      transition: all 0.3s;
    }

    button:hover {
      background: #5568d3;
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
    }

    .toggle-form {
      text-align: center;
      margin-top: 20px;
      color: #666;
    }

    .toggle-form a {
      color: #667eea;
      text-decoration: none;
      font-weight: bold;
    }

    .toggle-form a:hover {
      text-decoration: underline;
    }

    .error {
      background: #f8d7da;
      color: #721c24;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 20px;
      display: none;
      border-left: 4px solid #dc3545;
    }

    .success {
      background: #d4edda;
      color: #155724;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 20px;
      display: none;
      border-left: 4px solid #28a745;
    }

    .hidden {
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🛡️ Smart Financial Shield</h1>
    
    <div id="login-form">
      <h2>Welcome Back</h2>
      <div class="error" id="login-error"></div>
      
      <form onsubmit="login(); return false;" autocomplete="on">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="login-email" placeholder="Enter your email" autocomplete="email" required>
        </div>
        
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="login-password" placeholder="Enter your password" autocomplete="current-password" required>
        </div>
        
        <button type="submit">Login</button>
      </form>
      
      <div class="toggle-form">
        Don't have an account? <a href="#" onclick="showSignup(); return false;">Sign Up</a>
      </div>
    </div>

    <div id="signup-form" class="hidden">
      <h2>Create Account</h2>
      <div class="error" id="signup-error"></div>
      <div class="success" id="signup-success"></div>
      
      <form onsubmit="signup(); return false;" autocomplete="on">
        <div class="form-group">
          <label>First Name</label>
          <input type="text" id="signup-firstname" placeholder="Enter your first name" autocomplete="given-name" required>
        </div>
        
        <div class="form-group">
          <label>Last Name</label>
          <input type="text" id="signup-lastname" placeholder="Enter your last name" autocomplete="family-name" required>
        </div>
        
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="signup-email" placeholder="Enter your email" autocomplete="email" required>
        </div>
        
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="signup-password" placeholder="Create a password" autocomplete="new-password" required>
        </div>
        
        <button type="submit">Sign Up</button>
      </form>
      
      <div class="toggle-form">
        Already have an account? <a href="#" onclick="showLogin(); return false;">Login</a>
      </div>
    </div>
  </div>

  <script>
    function showSignup() {
      document.getElementById('login-form').classList.add('hidden');
      document.getElementById('signup-form').classList.remove('hidden');
      // Clear signup form
      document.getElementById('signup-firstname').value = '';
      document.getElementById('signup-lastname').value = '';
      document.getElementById('signup-email').value = '';
      document.getElementById('signup-password').value = '';
      document.getElementById('signup-error').style.display = 'none';
      document.getElementById('signup-success').style.display = 'none';
    }

    function showLogin() {
      document.getElementById('signup-form').classList.add('hidden');
      document.getElementById('login-form').classList.remove('hidden');
      
      // Remove readonly if user manually switches to login
      const emailField = document.getElementById('login-email');
      if (!sessionStorage.getItem('signup-email')) {
        emailField.removeAttribute('readonly');
        emailField.style.background = 'white';
        document.getElementById('login-error').style.display = 'none';
      }
    }

    async function signup() {
      const firstname = document.getElementById('signup-firstname').value.trim();
      const lastname = document.getElementById('signup-lastname').value.trim();
      const email = document.getElementById('signup-email').value.trim().toLowerCase();
      const password = document.getElementById('signup-password').value;
      const errorDiv = document.getElementById('signup-error');
      const successDiv = document.getElementById('signup-success');

      errorDiv.style.display = 'none';
      successDiv.style.display = 'none';

      if (!firstname || !lastname || !email || !password) {
        errorDiv.textContent = 'All fields are required';
        errorDiv.style.display = 'block';
        return;
      }

      // Email validation
      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      if (!emailRegex.test(email)) {
        errorDiv.textContent = 'Please enter a valid email address';
        errorDiv.style.display = 'block';
        return;
      }

      if (password.length < 6) {
        errorDiv.textContent = 'Password must be at least 6 characters';
        errorDiv.style.display = 'block';
        return;
      }

      try {
        const res = await fetch('http://localhost:3000/api/signup', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ firstname, lastname, email, password })
        });

        const data = await res.json();

        if (!res.ok) {
          errorDiv.textContent = data.error || 'Signup failed';
          errorDiv.style.display = 'block';
          return;
        }

        successDiv.textContent = '✅ Account created successfully! Redirecting to login...';
        successDiv.style.display = 'block';

        // Store email and password temporarily for auto-login
        sessionStorage.setItem('signup-email', email);
        sessionStorage.setItem('signup-password', password);

        // Clear the signup form
        document.getElementById('signup-firstname').value = '';
        document.getElementById('signup-lastname').value = '';
        document.getElementById('signup-email').value = '';
        document.getElementById('signup-password').value = '';

        setTimeout(() => {
          showLogin();
          // Pre-fill login with signup credentials
          const savedEmail = sessionStorage.getItem('signup-email');
          const savedPassword = sessionStorage.getItem('signup-password');
          
          if (savedEmail) {
            document.getElementById('login-email').value = savedEmail;
            document.getElementById('login-email').setAttribute('readonly', 'true');
            document.getElementById('login-email').style.background = '#f0f0f0';
          }
          if (savedPassword) {
            document.getElementById('login-password').value = savedPassword;
          }
          
          document.getElementById('login-password').focus();
          
          // Show helpful message
          const loginError = document.getElementById('login-error');
          loginError.style.display = 'block';
          loginError.style.background = '#d4edda';
          loginError.style.color = '#155724';
          loginError.style.borderLeft = '4px solid #28a745';
          loginError.textContent = '✅ Your credentials are ready! Just click Login to continue.';
        }, 1500);

      } catch (err) {
        errorDiv.textContent = 'Network error. Please check if the server is running.';
        errorDiv.style.display = 'block';
      }
    }

    async function login() {
      const email = document.getElementById('login-email').value.trim().toLowerCase();
      const password = document.getElementById('login-password').value;
      const errorDiv = document.getElementById('login-error');

      // Reset error styling
      errorDiv.style.background = '#f8d7da';
      errorDiv.style.color = '#721c24';
      errorDiv.style.borderLeft = '4px solid #dc3545';
      errorDiv.style.display = 'none';

      if (!email || !password) {
        errorDiv.textContent = 'Email and password are required';
        errorDiv.style.display = 'block';
        return;
      }

      try {
        const res = await fetch('http://localhost:3000/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        const data = await res.json();

        if (!res.ok) {
          errorDiv.textContent = data.error || 'Login failed';
          errorDiv.style.display = 'block';
          return;
        }

        // Clear session storage after successful login
        sessionStorage.removeItem('signup-email');
        sessionStorage.removeItem('signup-password');

        // Store user data
        localStorage.setItem('token', data.token);
        localStorage.setItem('userId', data.userId);
        localStorage.setItem('firstname', data.firstname);
        localStorage.setItem('lastname', data.lastname);
        localStorage.setItem('email', data.email);

        // Redirect to dashboard
        window.location.href = 'dashboard.html';

      } catch (err) {
        errorDiv.textContent = 'Network error. Please check if the server is running.';
        errorDiv.style.display = 'block';
      }
    }

    // Enable Enter key for forms
    document.addEventListener('DOMContentLoaded', function() {
      // Forms now use onsubmit, so Enter key works automatically
    });

    // Check if already logged in
    if (localStorage.getItem('token')) {
      window.location.href = 'dashboard.html';
    }
  </script>
</body>
</html>
