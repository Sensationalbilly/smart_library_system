<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Transaction History - Smart Financial Shield</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }
    .container { max-width: 1000px; margin: 0 auto; }
    .header {
      background: white;
      padding: 20px 30px;
      border-radius: 15px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      margin-bottom: 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .header h1 { color: #667eea; font-size: 28px; }
    .back-btn {
      background: #667eea;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      cursor: pointer;
      text-decoration: none;
    }
    .back-btn:hover { background: #5568d3; }
    .card {
      background: white;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }
    .stat-box {
      background: #f8f9fa;
      padding: 20px;
      border-radius: 10px;
      text-align: center;
    }
    .stat-value {
      font-size: 32px;
      font-weight: bold;
      color: #667eea;
      margin-bottom: 5px;
    }
    .stat-label {
      font-size: 14px;
      color: #666;
    }
    .transaction-list {
      margin-top: 20px;
    }
    .transaction-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px;
      background: #f8f9fa;
      border-radius: 10px;
      margin-bottom: 15px;
      border-left: 5px solid #667eea;
    }
    .transaction-item.high { border-left-color: #dc3545; }
    .transaction-item.medium { border-left-color: #ffc107; }
    .transaction-item.low { border-left-color: #28a745; }
    .transaction-info h3 {
      font-size: 16px;
      color: #333;
      margin-bottom: 5px;
    }
    .transaction-info p {
      font-size: 14px;
      color: #666;
    }
    .transaction-amount {
      text-align: right;
    }
    .amount {
      font-size: 24px;
      font-weight: bold;
      color: #333;
    }
    .risk-badge {
      display: inline-block;
      padding: 5px 15px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: bold;
      margin-top: 5px;
    }
    .risk-badge.high { background: #f8d7da; color: #721c24; }
    .risk-badge.medium { background: #fff3cd; color: #856404; }
    .risk-badge.low { background: #d4edda; color: #155724; }
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #666;
    }
    .empty-state h3 {
      font-size: 24px;
      margin-bottom: 10px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>📊 Transaction History</h1>
      <a href="dashboard.html" class="back-btn">← Back to Dashboard</a>
    </div>

    <div class="stats">
      <div class="stat-box">
        <div class="stat-value" id="totalTransactions">0</div>
        <div class="stat-label">Total Transactions</div>
      </div>
      <div class="stat-box">
        <div class="stat-value" id="highRiskCount">0</div>
        <div class="stat-label">High Risk</div>
      </div>
      <div class="stat-box">
        <div class="stat-value" id="totalAmount">$0</div>
        <div class="stat-label">Total Amount</div>
      </div>
    </div>

    <div class="card">
      <h2 style="margin-bottom: 20px; color: #333;">Recent Transactions</h2>
      <div class="transaction-list" id="transactionList">
        <div class="empty-state">
          <h3>📭 No Transactions Yet</h3>
          <p>Your transaction history will appear here</p>
        </div>
      </div>
    </div>
  </div>

  <script>
    window.onload = async function() {
      const token = localStorage.getItem('token');
      if (!token) {
        window.location.href = 'login.html';
        return;
      }

      await loadTransactions();
    };

    async function loadTransactions() {
      const token = localStorage.getItem('token');
      
      try {
        const res = await fetch('http://localhost:3000/api/transactions', {
          headers: { 'Authorization': `Bearer ${token}` }
        });

        const data = await res.json();
        const transactions = data.transactions || [];

        if (transactions.length === 0) return;

        // Update stats
        document.getElementById('totalTransactions').textContent = transactions.length;
        const highRisk = transactions.filter(t => t.flag === 'HIGH_RISK').length;
        document.getElementById('highRiskCount').textContent = highRisk;
        const total = transactions.reduce((sum, t) => sum + t.amount, 0);
        document.getElementById('totalAmount').textContent = `$${total.toLocaleString()}`;

        // Display transactions
        const listHtml = transactions.map(tx => {
          const riskClass = tx.flag === 'HIGH_RISK' ? 'high' : tx.flag === 'MEDIUM_RISK' ? 'medium' : 'low';
          const date = new Date(tx.timestamp).toLocaleString();
          
          return `
            <div class="transaction-item ${riskClass}">
              <div class="transaction-info">
                <h3>${tx.type.charAt(0).toUpperCase() + tx.type.slice(1)} Transaction</h3>
                <p>${date}</p>
              </div>
              <div class="transaction-amount">
                <div class="amount">$${tx.amount.toLocaleString()}</div>
                <span class="risk-badge ${riskClass}">${tx.flag.replace('_', ' ')}</span>
              </div>
            </div>
          `;
        }).join('');

        document.getElementById('transactionList').innerHTML = listHtml;
      } catch (err) {
        console.error('Error loading transactions:', err);
      }
    }
  </script>
</body>
</html>
